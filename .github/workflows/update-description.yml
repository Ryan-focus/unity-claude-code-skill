name: Update Repository Description

on:
  workflow_dispatch:

permissions:
  administration: write

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - name: Update repo description
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              description: "A Claude Code custom skill that turns Claude Code into a Unity AI development assistant \u2014 one-click MCP setup, auto-diagnosis, direct Unity Editor operations, rapid prototyping workflows, and C# script templates. Supports Unity Official MCP and Coplay MCP."
            });
            console.log("Repository description updated successfully!");

      - name: Clean up this workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Get the SHA of the workflow file
            const { data } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows/update-description.yml'
            });
            // Delete the workflow file after it runs
            await github.rest.repos.deleteFile({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows/update-description.yml',
              message: 'ci: remove one-time update-description workflow',
              sha: data.sha
            });
            console.log("Workflow file cleaned up!");
